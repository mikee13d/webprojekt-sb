<h1>Books</h1>

<a href="/books/create">New Book</a>

<ul>
    <li th:each="b : ${books}">
        <span th:text="${b.title}"></span>
        <span th:text="${b.publishedDate}"></span>

        <a th:href="@{/books/edit/{id}(id=${b.id})}">Edit</a>
        <a th:href="@{/books/delete/{id}(id=${b.id})}">Delete</a>
    </li>
</ul>
